<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>코파일럿 — 드라이빙 AI (v2.0)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c10;
    --surface: #12151c;
    --surface2: #1a1f2b;
    --border: rgba(255,255,255,0.07);
    --text: #e8eaf0;
    --muted: #5a6070;
    --gemini-color: #4285f4;
    --claude-color: #c96a2e;
    --listen-color: #34d399;
    --think-color: #a78bfa;
    --speak-color: #60a5fa;
    --accent: #34d399;
    --danger: #f87171;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    height: 100dvh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .screen { display: none; flex-direction: column; height: 100dvh; }
  .screen.active { display: flex; }

  /* ══════════════════════════════
     DRIVING SCREEN
  ══════════════════════════════ */
  #drive-screen {
    background: var(--bg);
    align-items: center;
    justify-content: space-between;
    padding: 0;
  }

  .drive-topbar {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 28px 0;
  }

  .ai-badge {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--surface);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    font-weight: 500;
  }
  .ai-badge.gemini { color: var(--gemini-color); border-color: rgba(66,133,244,0.3); }

  .ai-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

  .location-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    border-radius: 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    font-size: 11px;
    color: var(--muted);
  }

  .settings-btn {
    background: none;
    border: none;
    color: var(--muted);
    padding: 6px;
  }

  .drive-center {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 32px;
    width: 100%;
  }

  .state-orb-wrapper {
    position: relative;
    width: 200px; height: 200px;
    display: flex; align-items: center; justify-content: center;
  }

  .state-orb {
    width: 160px; height: 160px;
    border-radius: 50%;
    background: var(--surface2);
    border: 2px solid var(--border);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 10px;
    transition: all 0.4s ease;
  }

  .orb-ring {
    position: absolute; border-radius: 50%; border: 1.5px solid currentColor; opacity: 0;
  }

  @keyframes ring-expand {
    0% { width: 160px; height: 160px; opacity: 0.6; }
    100% { width: 210px; height: 210px; opacity: 0; }
  }

  .state-orb.listening .orb-ring {
    color: var(--listen-color); animation: ring-expand 1.4s ease-out infinite;
  }

  .state-orb.listening { border-color: var(--listen-color); }
  .state-orb.thinking { border-color: var(--think-color); }
  .state-orb.speaking { border-color: var(--speak-color); }

  .orb-icon { font-size: 36px; }
  .orb-label { font-size: 12px; font-family: 'DM Mono', monospace; text-transform: uppercase; }

  .state-idle .orb-icon::before { content: "◉"; color: var(--muted); }
  .state-listening .orb-icon::before { content: "◎"; color: var(--listen-color); }
  .state-thinking .orb-icon::before { content: "◈"; color: var(--think-color); }
  .state-speaking .orb-icon::before { content: "◈"; color: var(--speak-color); }

  .current-text {
    font-size: 15px; color: var(--text); text-align: center;
    max-width: 85%; line-height: 1.6; min-height: 50px;
  }

  .drive-bottom {
    width: 100%; padding: 20px 28px 36px; display: flex; flex-direction: column; gap: 16px;
  }

  .mic-btn {
    width: 80px; height: 80px; border-radius: 50%;
    background: var(--surface2); border: 3px solid var(--accent);
    color: var(--accent); display: flex; align-items: center; justify-content: center;
  }
  .mic-btn.recording { animation: pulse 1.5s infinite; background: rgba(52,211,153,0.1); }

  @keyframes pulse { 0% { box-shadow: 0 0 0 0px rgba(52,211,153,0.4); } 100% { box-shadow: 0 0 0 20px rgba(52,211,153,0); } }

  /* SETTINGS */
  .api-input {
    width: 100%; background: var(--bg); border: 1px solid var(--border);
    padding: 12px; color: var(--text); border-radius: 8px; margin-top: 8px;
  }

  .chat-scroll { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
  .chat-bubble { padding: 12px; border-radius: 12px; max-width: 85%; font-size: 14px; }
  .chat-bubble.user { align-self: flex-end; background: var(--surface2); }
  .chat-bubble.ai { align-self: flex-start; background: var(--surface); border: 1px solid var(--border); }

  @keyframes thinking-dot { 0%,80%,100% { opacity: 0.2; } 40% { opacity: 1; } }
  .thinking-dots span { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--think-color); margin: 0 2px; animation: thinking-dot 1s infinite; }
</style>
</head>
<body>

<div id="drive-screen" class="screen active">
  <div class="drive-topbar">
    <div class="ai-badge gemini">
      <span class="ai-dot"></span>
      <span>Gemini 1.5 Flash</span>
    </div>
    <div class="location-pill">📍 <span id="loc-text">위치 정보 대기</span></div>
    <button class="settings-btn" onclick="showScreen('home-screen')">⚙️</button>
  </div>

  <div class="drive-center">
    <div class="state-orb-wrapper">
      <div class="orb-ring"></div>
      <div id="state-orb" class="state-orb idle" onclick="toggleMic()">
        <div class="orb-icon state-idle"></div>
        <div class="orb-label" id="orb-label">탭하여 시작</div>
      </div>
    </div>
    <div class="current-text" id="current-text">운전 중 아이디어를 말씀해주세요</div>
  </div>

  <div class="drive-bottom">
    <div style="display:flex; justify-content:center;">
      <button id="mic-btn" class="mic-btn" onclick="toggleMic()">🎤</button>
    </div>
  </div>
</div>

<div id="home-screen" class="screen" style="padding: 20px;">
  <h2 style="margin-bottom:20px;">설정 및 히스토리</h2>
  <div style="margin-bottom:20px;">
    <label style="font-size:12px; color:var(--muted)">GEMINI API KEY</label>
    <input type="password" id="gemini-key" class="api-input" placeholder="AIza...">
  </div>
  <div id="chat-history" class="chat-scroll"></div>
  <button onclick="showScreen('drive-screen')" style="padding:15px; background:var(--accent); border:none; border-radius:8px; color:black; font-weight:bold;">드라이빙 모드로 복귀</button>
</div>

<script>
const state = {
  mode: 'idle',
  recognition: null,
  synth: window.speechSynthesis,
  apiKey: '',
  history: []
};

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function setMode(mode) {
  state.mode = mode;
  const orb = document.getElementById('state-orb');
  const label = document.getElementById('orb-label');
  const icon = orb.querySelector('.orb-icon');
  
  orb.className = 'state-orb ' + mode;
  icon.className = 'orb-icon state-' + mode;
  
  const labels = { idle: '탭하여 시작', listening: '듣고 있어요', thinking: '생각 중...', speaking: '답변 중' };
  label.textContent = labels[mode];
}

function toggleMic() {
  if (state.mode === 'listening') { stopListening(); return; }
  if (state.mode === 'speaking') { state.synth.cancel(); setMode('idle'); return; }
  startListening();
}

function startListening() {
  const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!Speech) { alert("이 브라우저는 음성 인식을 지원하지 않습니다."); return; }

  state.recognition = new Speech();
  state.recognition.lang = 'ko-KR';
  state.recognition.interimResults = true;

  state.recognition.onstart = () => {
    setMode('listening');
    document.getElementById('mic-btn').classList.add('recording');
  };

  state.recognition.onresult = (e) => {
    const text = Array.from(e.results).map(r => r[0].transcript).join('');
    document.getElementById('current-text').textContent = text;
    if (e.results[e.results.length - 1].isFinal) {
      stopListening();
      handleQuery(text);
    }
  };

  state.recognition.start();
}

function stopListening() {
  if (state.recognition) state.recognition.stop();
  document.getElementById('mic-btn').classList.remove('recording');
}

async function handleQuery(text) {
  const key = document.getElementById('gemini-key').value;
  if (!key) { alert("API 키를 먼저 입력해주세요."); setMode('idle'); return; }

  setMode('thinking');
  document.getElementById('current-text').innerHTML = '<div class="thinking-dots"><span></span><span></span><span></span></div>';

  try {
    // 1단계: 청음 교정 (아이디어 반영)
    const correctedText = await callGemini(key, "너는 STT 교정 전문가야. 다음 문장의 오타를 고치고 자연스러운 한국어 문장으로 다듬어줘. 결과값만 출력해.", text);
    
    // 2단계: 메인 답변 생성
    const systemPrompt = "너는 운전 중인 사용자의 비서야. 답변은 반드시 2~3문장 이내로, 아주 짧고 간결한 구어체로 해줘. 불필요한 서론은 생략해.";
    const answer = await callGemini(key, systemPrompt, correctedText);

    addHistory('user', correctedText);
    addHistory('ai', answer);

    document.getElementById('current-text').textContent = answer;
    setMode('speaking');
    speak(answer);
  } catch (err) {
    console.error(err);
    document.getElementById('current-text').textContent = "연결에 실패했습니다.";
    setMode('idle');
  }
}

async function callGemini(key, system, userText) {
  const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`;
  const response = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON
